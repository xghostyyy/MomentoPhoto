<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momento — Дашборд</title>
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>
  <div id="toast-container"></div>

  <aside class="sidebar">
    <div class="sidebar-logo">Momento</div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-tab="bookings">Заявки</button>
      <button class="nav-item admin-only hidden" data-tab="users">Пользователи</button>
      <button class="nav-item admin-only hidden" data-tab="reviews">Отзывы</button>
    </nav>
    <div class="sidebar-footer">
      <span id="user-name" class="user-name"></span>
      <span id="user-role" class="user-role"></span>
      <button id="logout-btn" class="btn-logout">Выйти</button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <h1 id="tab-title">Заявки</h1>
      <a href="/" class="back-link">← На сайт</a>
    </header>

    <!-- Bookings tab -->
    <section id="tab-bookings" class="tab-content">
      <div class="table-wrap">
        <table id="bookings-table" class="data-table">
          <thead>
            <tr>
              <th>#</th><th>Клиент</th><th>Телефон</th>
              <th>Услуга</th><th>Дата</th><th>Статус</th><th>Действия</th>
            </tr>
          </thead>
          <tbody id="bookings-body"><tr><td colspan="7" class="loading">Загрузка…</td></tr></tbody>
        </table>
      </div>
    </section>

    <!-- Users tab (admin) -->
    <section id="tab-users" class="tab-content hidden">
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr><th>#</th><th>Имя</th><th>Email</th><th>Роль</th><th>Тип</th><th>Действия</th></tr>
          </thead>
          <tbody id="users-body"><tr><td colspan="6" class="loading">Загрузка…</td></tr></tbody>
        </table>
      </div>
    </section>

    <!-- Reviews tab (admin) -->
    <section id="tab-reviews" class="tab-content hidden">
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr><th>#</th><th>Клиент</th><th>Услуга</th><th>Рейтинг</th><th>Текст</th><th>Дата</th><th>Статус</th><th>Действия</th></tr>
          </thead>
          <tbody id="reviews-body"><tr><td colspan="8" class="loading">Загрузка…</td></tr></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/js/dashboard.js"></script>
</body>
</html>

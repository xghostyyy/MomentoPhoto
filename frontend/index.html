<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momento — Фотостудия</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- Auth modal -->
  <div id="auth-modal" class="modal hidden">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-box">
      <button class="modal-close" id="modal-close">&times;</button>

      <div class="tabs">
        <button class="tab active" data-tab="login">Войти</button>
        <button class="tab" data-tab="register">Регистрация</button>
      </div>

      <!-- Login -->
      <form id="login-form" class="form auth-form">
        <input type="email"    id="login-email"    placeholder="Email"    required />
        <input type="password" id="login-password" placeholder="Пароль"   required />
        <button type="submit" class="btn btn--full">Войти</button>
        <p id="login-msg" class="form-msg"></p>
      </form>

      <!-- Register -->
      <form id="register-form" class="form auth-form hidden">
        <input type="text"     id="reg-name"     placeholder="Ваше имя"  required />
        <input type="email"    id="reg-email"    placeholder="Email"      required />
        <input type="password" id="reg-password" placeholder="Пароль"    required />
        <button type="submit" class="btn btn--full">Зарегистрироваться</button>
        <p id="register-msg" class="form-msg"></p>
      </form>
    </div>
  </div>

  <header class="header">
    <div class="container">
      <h1 class="logo">Momento</h1>
      <nav class="nav">
        <a href="#services">Услуги</a>
        <a href="#booking">Запись</a>
        <a href="#reviews">Отзывы</a>
      </nav>
      <div class="header-auth">
        <span id="user-greeting" class="user-greeting hidden"></span>
        <button id="auth-btn"   class="btn btn--sm">Войти</button>
        <button id="logout-btn" class="btn btn--sm btn--outline hidden">Выйти</button>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <h2>Запечатлейте лучшие моменты</h2>
        <p>Профессиональная фотостудия в вашем городе</p>
        <a href="#booking" class="btn">Записаться</a>
      </div>
    </section>

    <section id="services" class="section">
      <div class="container">
        <h2 class="section-title">Наши услуги</h2>
        <div id="services-list" class="services-grid">
          <p>Загрузка...</p>
        </div>
      </div>
    </section>

    <section id="booking" class="section section--gray">
      <div class="container">
        <h2 class="section-title">Запись на съёмку</h2>
        <form id="booking-form" class="form">
          <input type="text" id="client_name"  placeholder="Ваше имя"           required />
          <input type="tel"  id="client_phone" placeholder="+7 (___) ___-__-__" required />
          <select id="service" required>
            <option value="">Выберите услугу</option>
          </select>
          <button type="submit" class="btn">Отправить заявку</button>
          <p id="booking-msg" class="form-msg"></p>
        </form>
      </div>
    </section>

    <section id="reviews" class="section">
      <div class="container">
        <h2 class="section-title">Отзывы</h2>
        <div id="reviews-list" class="reviews-grid">
          <p>Загрузка...</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2024 Momento. Все права защищены.</p>
    </div>
  </footer>

  <script src="/js/main.js"></script>
</body>
</html>
